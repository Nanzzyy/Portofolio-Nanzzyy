<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — Nanda Portfolio</title>
    <link href="/css/output.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-[#F9F9F9] text-text font-sans antialiased min-h-screen">

<!-- Topbar -->
<nav class="bg-card border-b border-border sticky top-0 z-50">
    <div class="max-w-[1200px] mx-auto px-6 md:px-10 h-16 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-full bg-text text-white flex items-center justify-center font-display font-bold text-xs">N</div>
            <span class="font-display font-bold text-lg text-text">Admin Panel</span>
        </div>
        <div class="flex items-center gap-5">
            <a href="/" target="_blank" class="text-[13px] font-semibold text-text-muted hover:text-text transition-colors flex items-center gap-1.5">
                <i data-lucide="external-link" class="w-4 h-4"></i> View Site
            </a>
            <button onclick="logout()" class="btn btn-outline text-xs py-2 px-4">Logout</button>
        </div>
    </div>
</nav>

<main class="max-w-[1200px] mx-auto px-6 md:px-10 py-10 grid lg:grid-cols-5 gap-8">
    
    <!-- ══ ADD PROJECT FORM ══ -->
    <div class="lg:col-span-2">
        <div class="card p-6 md:p-8 sticky top-24">
            <div class="flex items-center gap-3 mb-8 border-b border-border pb-4">
                <div class="w-8 h-8 rounded-lg bg-text text-white flex items-center justify-center">
                    <i data-lucide="plus" class="w-4 h-4"></i>
                </div>
                <h2 class="text-lg font-bold text-text">Add New Project</h2>
            </div>

            <form id="add-project-form" class="space-y-5">
                <div class="space-y-1.5">
                    <label class="text-xs font-bold text-text uppercase tracking-wider">Project Title</label>
                    <input type="text" name="title" required class="input" placeholder="E.g. E-Commerce Website">
                </div>
                
                <div class="space-y-1.5">
                    <label class="text-xs font-bold text-text uppercase tracking-wider">Description</label>
                    <textarea name="description" required rows="4" class="input resize-none" placeholder="Brief description of the project..."></textarea>
                </div>

                <div class="space-y-1.5">
                    <label class="text-xs font-bold text-text uppercase tracking-wider">Tech Stack</label>
                    <input type="text" name="language" required class="input" placeholder="E.g. HTML, CSS, JavaScript, Node.js">
                    <p class="text-[10px] text-text-muted font-medium mt-1">Separate multiple technologies with commas</p>
                </div>

                <div class="space-y-1.5">
                    <label class="text-xs font-bold text-text uppercase tracking-wider">Preview Image URL</label>
                    <input type="url" name="preview_url" class="input" placeholder="https://example.com/preview.jpg">
                </div>

                <div class="space-y-1.5">
                    <label class="text-xs font-bold text-text uppercase tracking-wider">Live Website URL</label>
                    <input type="url" name="website_url" class="input" placeholder="https://myproject.com">
                </div>

                <button type="submit" class="w-full btn btn-dark py-3.5 mt-4" id="save-btn">
                    <i data-lucide="save" class="w-4 h-4"></i> Save Project
                </button>
                <p id="form-status" class="text-center text-sm font-medium hidden"></p>
            </form>
        </div>
    </div>

    <!-- ══ PROJECT LIST ══ -->
    <div class="lg:col-span-3 space-y-6">
        <div class="flex items-center justify-between pb-4 border-b border-border">
            <h2 class="text-xl font-bold text-text">Projects</h2>
            <span class="px-3 py-1.5 rounded-full bg-card border border-border text-xs font-bold text-text" id="project-count">Total: 0</span>
        </div>

        <div id="admin-projects" class="space-y-4 mt-4">
            <div class="text-center py-16 text-text-muted" id="admin-loading">
                <div class="inline-flex items-center gap-3">
                    <i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i>
                    <span class="font-medium">Loading projects...</span>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="/js/admin.js"></script>
<script>lucide.createIcons();</script>
</body>
</html>
