<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Admin</title>
    <link href="/css/output.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="text-text font-sans antialiased min-h-screen flex items-center justify-center">

<div class="w-full max-w-md p-8 card mx-4">
    <div class="text-center mb-10">
        <div class="w-14 h-14 rounded-full bg-text text-white flex items-center justify-center font-display font-bold text-2xl mx-auto mb-5">N</div>
        <h1 class="text-2xl font-black text-text font-display uppercase tracking-tight">Admin Login</h1>
        <p class="text-text-muted text-sm mt-2">Sign in to manage your portfolio</p>
    </div>

    <div class="bg-red-50 border border-red-200 text-red-600 p-3 rounded-xl text-sm text-center font-semibold hidden" id="login-error"></div>

    <form id="login-form" class="space-y-5 mt-6">
        <div class="space-y-1.5">
            <label class="text-xs font-bold text-text uppercase tracking-wider">Email Address</label>
            <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                    <i data-lucide="mail" class="w-4 h-4 text-text-muted/60"></i>
                </div>
                <input type="email" name="username" required class="input !pl-12" placeholder="Enter your email">
            </div>
        </div>
        <div class="space-y-1.5">
            <label class="text-xs font-bold text-text uppercase tracking-wider">Password</label>
            <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                    <i data-lucide="lock" class="w-4 h-4 text-text-muted/60"></i>
                </div>
                <input type="password" name="password" required class="input !pl-12" placeholder="Enter password">
            </div>
        </div>
        <button type="submit" class="w-full btn btn-dark py-3.5 mt-2">
            Sign In
        </button>
    </form>
    <div class="mt-8 text-center border-t border-border pt-6">
        <a href="/" class="text-sm font-semibold text-text-muted hover:text-text transition-colors inline-flex items-center gap-2">
            <i data-lucide="arrow-left" class="w-4 h-4"></i> Back to Portfolio
        </a>
    </div>
</div>

<script>
    lucide.createIcons();

    const SUPABASE_URL = 'https://yomlvkdrpzgliulerxxc.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_VTJlxgl9WEx0PxxFZXRekw_Fi7FZjg5';
    const sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const form = e.target;
        const email = form.username.value; // Using email for Supabase Auth
        const password = form.password.value;
        const submitBtn = form.querySelector('button');
        const err = document.getElementById('login-error');

        submitBtn.disabled = true;
        submitBtn.textContent = 'Authenticating...';
        err.classList.add('hidden');

        try {
            const { data, error } = await sbClient.auth.signInWithPassword({
                email: email,
                password: password,
            });

            if (error) throw error;

            // Successful login
            window.location.href = '/admin.html';
        } catch (error) {
            console.error('Login error:', error);
            err.textContent = error.message || 'Invalid login credentials.';
            err.classList.remove('hidden');
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = 'Sign In';
        }
    });
</script>
</body>
</html>
